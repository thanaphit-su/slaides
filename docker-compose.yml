name: slaides

include:
  - path:
      - docker/supabase/docker-compose.yml
      - docker/supabase/docker-compose.pg17.yml
    env_file: docker/supabase/.env.slaides

services:
  redis:
    image: redis:7-alpine
    container_name: slaides-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30
