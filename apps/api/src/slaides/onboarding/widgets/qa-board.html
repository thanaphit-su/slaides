<section class="qa-board" id="root">
  <h3 class="qa-board-prompt" id="prompt">Loading…</h3>
  <form class="qa-board-form" id="form" novalidate>
    <input
      type="text"
      class="qa-board-input"
      id="input"
      autocomplete="off"
      maxlength="280"
    />
    <button type="submit" class="qa-board-submit">Send</button>
  </form>
  <ol class="qa-board-list" id="list"></ol>
  <p class="qa-board-status" id="status" aria-live="polite">No questions yet.</p>
</section>
