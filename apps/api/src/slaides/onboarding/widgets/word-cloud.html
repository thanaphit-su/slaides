<section class="word-cloud" id="root">
  <h3 class="word-cloud-prompt" id="prompt">Loading…</h3>
  <form class="word-cloud-form" id="form" novalidate>
    <input
      type="text"
      class="word-cloud-input"
      id="input"
      autocomplete="off"
      placeholder="Type a word…"
    />
    <button type="submit" class="word-cloud-submit">Add</button>
  </form>
  <ul class="word-cloud-words" id="words"></ul>
  <p class="word-cloud-status" id="status" aria-live="polite">No words yet.</p>
</section>
