<form class="quick-quiz" id="root" novalidate>
  <fieldset>
    <legend class="quick-quiz-question" id="question">Loading…</legend>
    <ul class="quick-quiz-choices" id="choices"></ul>
  </fieldset>
  <div class="quick-quiz-actions">
    <button type="submit" class="quick-quiz-submit" id="submit" disabled>Submit</button>
    <button type="button" class="quick-quiz-reset" id="reset" hidden>Try again</button>
  </div>
  <p class="quick-quiz-feedback" id="feedback" aria-live="polite"></p>
</form>
