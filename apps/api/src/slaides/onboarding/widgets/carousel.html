<figure class="carousel" id="root">
  <div class="carousel-frame">
    <img class="carousel-img" id="img" alt="" />
    <button type="button" class="carousel-nav carousel-prev" id="prev" aria-label="Previous">‹</button>
    <button type="button" class="carousel-nav carousel-next" id="next" aria-label="Next">›</button>
  </div>
  <figcaption class="carousel-caption" id="caption"></figcaption>
  <ol class="carousel-dots" id="dots" aria-label="Image index"></ol>
</figure>
