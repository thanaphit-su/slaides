name: slaides-prod

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SLAIDES_DOMAIN: ${SLAIDES_DOMAIN:?SLAIDES_DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SLAIDES_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GUEST_JWT_SECRET: ${GUEST_JWT_SECRET:?GUEST_JWT_SECRET is required}
      SUPABASE_URL: ${SUPABASE_URL:?SUPABASE_URL is required}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:?SUPABASE_JWT_SECRET is required}
      LLM_ENCRYPTION_SECRET: ${LLM_ENCRYPTION_SECRET:?LLM_ENCRYPTION_SECRET is required}
      SESSION_AUDIENCE_CAP: ${SESSION_AUDIENCE_CAP:-500}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  caddy-data:
  caddy-config:
  redis-data:
