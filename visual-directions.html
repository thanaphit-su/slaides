<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SLAIDES — visual directions</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..800;1,9..144,300..800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; padding:0; background:#1a1816; }
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; }

  /* ============ shared artboard reset ============ */
  .ab { box-sizing:border-box; overflow:hidden; position:relative; }
  .ab * { box-sizing:border-box; }

  /* ============ DIRECTION A — FIELD NOTES ============ */
  .dA {
    --ink: #1a1612;
    --ink-soft: #3a342c;
    --paper: #f6f1e6;
    --paper-2: #ede6d4;
    --rule: #d9cfb8;
    --rule-soft: #e7dfc9;
    --accent: #b4502b;       /* terracotta */
    --accent-deep: #8c3a1c;
    --serif: 'Fraunces', 'Newsreader', Georgia, serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
  }
  .dA .grain {
    position:absolute; inset:0; pointer-events:none; opacity:.5;
    background-image:
      radial-gradient(circle at 18% 22%, rgba(180,80,43,.10) 0 1px, transparent 2px),
      radial-gradient(circle at 78% 64%, rgba(26,22,18,.08) 0 1px, transparent 2px),
      radial-gradient(circle at 44% 88%, rgba(180,80,43,.08) 0 1px, transparent 2px);
    background-size: 220px 220px, 180px 180px, 260px 260px;
    mix-blend-mode: multiply;
  }
  .dA .marg {
    position:absolute; top:24px; left:24px;
    font-family: var(--mono); font-size:11px; color: var(--ink-soft);
    letter-spacing:.04em; text-transform:uppercase;
  }
  .dA .marg .dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; margin-right:8px; vertical-align:1px; }
  .dA .pageno { position:absolute; top:24px; right:24px; font-family:var(--mono); font-size:11px; color:var(--ink-soft); }
  .dA h1.display {
    font-family: var(--serif); font-weight:500; font-size:64px; line-height:1.02;
    letter-spacing:-0.02em; margin:0; color: var(--ink);
  }
  .dA h1.display em { font-style:italic; color:var(--accent-deep); font-weight:400; }
  .dA .lede { font-family:var(--serif); font-weight:400; font-size:18px; line-height:1.55; color:var(--ink-soft); max-width: 50ch; }
  .dA .meta { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); display:flex; gap:18px; }
  .dA .meta b { color: var(--accent-deep); font-weight:500; }
  .dA .stepper { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; color:var(--ink-soft); }
  .dA .stepper .pip { width:6px; height:6px; border-radius:50%; background:var(--rule); }
  .dA .stepper .pip.on { background:var(--accent); }

  /* ============ DIRECTION B — EDITORIAL PRESS ============ */
  .dB {
    --ink: #0b0d10;
    --ink-soft: #4b525b;
    --paper: #ffffff;
    --paper-2: #f5f4f1;
    --rule: #e3e1dc;
    --rule-soft: #ecebe6;
    --accent: #1f3a8a;     /* deep ink-blue */
    --accent-2: #c2410c;   /* warm secondary */
    --serif: 'Newsreader', 'Fraunces', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
  }
  .dB h1.display {
    font-family: var(--serif); font-weight:400; font-size:68px; line-height:1.04;
    letter-spacing:-0.025em; margin:0; color: var(--ink);
  }
  .dB h1.display em { font-style:italic; font-weight:300; }
  .dB .rule { height:1px; background: var(--ink); width:48px; }
  .dB .kicker { font-family:var(--sans); font-size:11px; text-transform:uppercase; letter-spacing:.18em; font-weight:600; color:var(--accent); }
  .dB .lede { font-family:var(--serif); font-weight:300; font-size:18px; line-height:1.6; color:var(--ink-soft); max-width: 56ch; }
  .dB .meta { font-family:var(--sans); font-size:12px; color:var(--ink-soft); display:flex; gap:20px; }
  .dB .meta b { color: var(--ink); font-weight:600; }

  /* ============ DIRECTION C — RISO STUDIO ============ */
  .dC {
    --ink: #1c1a17;
    --ink-soft: #5b554b;
    --paper: #f1ead8;
    --paper-2: #e6dcc1;
    --clay: #d34a2a;
    --clay-2: rgba(211,74,42,.55);
    --teal: #1d6680;
    --teal-2: rgba(29,102,128,.50);
    --rule: #cfc4a4;
    --serif: 'Instrument Serif', 'Fraunces', Georgia, serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    position:relative;
  }
  .dC .halftone {
    position:absolute; inset:0; pointer-events:none; opacity:.45;
    background-image: radial-gradient(rgba(211,74,42,.55) 1.1px, transparent 1.4px);
    background-size: 7px 7px;
    -webkit-mask-image: radial-gradient(ellipse at 30% 10%, black 0%, transparent 65%);
            mask-image: radial-gradient(ellipse at 30% 10%, black 0%, transparent 65%);
  }
  .dC .halftone.teal {
    background-image: radial-gradient(rgba(29,102,128,.55) 1.1px, transparent 1.4px);
    -webkit-mask-image: radial-gradient(ellipse at 80% 90%, black 0%, transparent 60%);
            mask-image: radial-gradient(ellipse at 80% 90%, black 0%, transparent 60%);
  }
  .dC h1.display {
    font-family: var(--serif); font-weight:400; font-size:78px; line-height:0.98;
    letter-spacing:-0.01em; margin:0; color: var(--ink);
  }
  .dC h1.display em { font-style:italic; color:var(--clay); }
  .dC .stamp {
    display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px;
    text-transform:uppercase; letter-spacing:.1em; color:var(--clay); border:1px solid var(--clay);
    padding:4px 10px; border-radius:999px;
  }
  .dC .lede { font-family:var(--serif); font-weight:400; font-size:20px; line-height:1.5; color:var(--ink-soft); max-width: 48ch; }
  .dC .meta { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); display:flex; gap:18px; }

  /* ============ COMMON UI PIECES (instructor + audience widgets) ============ */
  .panel { border-radius:14px; padding:18px; }

  .keycap { font-family: var(--mono, 'IBM Plex Mono'); font-size:10px; padding:2px 6px; border-radius:4px; border:1px solid currentColor; opacity:.7; }

  .swatch { width:42px; height:42px; border-radius:10px; }
  .swatch.sm { width:28px; height:28px; border-radius:8px; }

  /* tiny chart for sample slide */
  .chartA path { stroke: var(--accent); }
  .chartB path { stroke: var(--accent); }
  .chartC path { stroke: var(--clay); }

  /* wordmark */
  .wm { letter-spacing:.18em; font-weight:600; }

  /* Editor-snippet shared */
  .ed-line { height:8px; border-radius:3px; }
  .ed-h    { height:14px; border-radius:4px; }

  /* sticky highlight selection */
  .sel { background: rgba(180,80,43,.18); padding:0 2px; border-radius:2px; }
  .selB { background: rgba(31,58,138,.13); padding:0 2px; border-radius:2px; }
  .selC { background: rgba(211,74,42,.20); padding:0 2px; border-radius:2px; }

</style>
</head>
